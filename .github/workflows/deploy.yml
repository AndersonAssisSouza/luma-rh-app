name: Deploy LUMA RH → Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Copy standalone files to dist
        run: |
          # HTML avulsos (index.html já foi gerado pelo build — não sobrescrever)
          for f in acesso-negado.html admin.html configuracoes.html em-construcao.html \
                    login.html manager.html mensagens_aniversario.html mockup_master.html \
                    people_analytics_editor.html portal_ferias_colaborador.html \
                    reset-password.html trocar-senha.html; do
            [ -f "$f" ] && cp "$f" dist/
          done

          # JS modules e libs standalone
          for f in supabase_client.js people_analytics_editor.js portal_ferias_colaborador.js \
                    login.js acesso-negado.js admin.js configuracoes.js index.js manager.js \
                    mensagens_aniversario.js reset-password.js msal-browser.min.js; do
            [ -f "$f" ] && cp "$f" dist/
          done

          # Headers Cloudflare Pages
          [ -f _headers ] && cp _headers dist/

          # Assets compartilhados (logo, etc.)
          [ -d assets ] && cp -r assets dist/

          # Manuais
          [ -d manuais ] && cp -r manuais dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=luma-rh-app --branch=main
