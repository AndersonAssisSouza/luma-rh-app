<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LUMA RH · Mensagens de Aniversário</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='12' fill='%239b66f4'/%3E%3Cpolygon points='20,15 42,15 50,72 58,15 80,15 60,88 40,88' fill='%23ffd000'/%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0f0e17;color:#f0eeff;min-height:100vh;}

/* HEADER */
.header{background:#18162a;border-bottom:1px solid #2d2b45;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:38px;height:38px;background:#9b66f4;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#ffd000;font-family:monospace;flex-shrink:0;}
.logo-text{font-size:17px;font-weight:700;color:#fff;}
.logo-sub{font-size:11px;color:#a78bfa;letter-spacing:.04em;text-transform:uppercase;}
.header-nav{display:flex;align-items:center;gap:10px;}
.btn-back{color:#a78bfa;background:none;border:1px solid #3d3660;border-radius:7px;padding:6px 14px;font-size:13px;cursor:pointer;text-decoration:none;transition:all .2s;}
.btn-back:hover{background:#3d3660;color:#f0eeff;}
.btn-sair{background:#2d1c3e;border:1px solid #5b21b6;border-radius:7px;padding:6px 14px;font-size:13px;color:#c4b5fd;cursor:pointer;transition:all .2s;}
.btn-sair:hover{background:#5b21b6;color:#fff;}

/* TABS */
.tabs{background:#18162a;border-bottom:1px solid #2d2b45;display:flex;padding:0 24px;}
.tab{padding:14px 22px;font-size:14px;font-weight:500;color:#7c7a9e;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;}
.tab:hover{color:#c4b5fd;}
.tab.active{color:#9b66f4;border-bottom-color:#9b66f4;font-weight:600;}

/* MAIN */
.main{padding:28px 24px;max-width:1300px;margin:0 auto;}

/* SECTION MENSAGENS */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:16px;font-weight:600;color:#f0eeff;display:flex;align-items:center;gap:8px;}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;border-radius:11px;font-size:11px;font-weight:700;padding:0 6px;}
.badge-func{background:#312e81;color:#a5b4fc;}
.badge-emp{background:#1e3a5f;color:#7dd3fc;}

.btn-add{background:#9b66f4;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;transition:background .2s;display:flex;align-items:center;gap:6px;}
.btn-add:hover{background:#8b5cf6;}

.msgs-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px;}
@media(max-width:800px){.msgs-grid{grid-template-columns:1fr;}}

.msgs-col{background:#18162a;border:1px solid #2d2b45;border-radius:12px;overflow:hidden;}
.msgs-col-header{padding:16px 20px;border-bottom:1px solid #2d2b45;display:flex;align-items:center;justify-content:space-between;}
.msgs-col-title{font-size:14px;font-weight:600;color:#f0eeff;display:flex;align-items:center;gap:8px;}
.msgs-list{padding:8px;}

.msg-card{background:#0f0e17;border:1px solid #2d2b45;border-radius:8px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;transition:border-color .2s;}
.msg-card:hover{border-color:#9b66f4;}
.msg-card.inativo{opacity:.5;}
.msg-texto{flex:1;font-size:13px;color:#d4d0f0;line-height:1.6;}
.msg-actions{display:flex;gap:6px;flex-shrink:0;}
.btn-icon{width:30px;height:30px;border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;}
.btn-edit{background:#1e1a36;color:#a78bfa;}
.btn-edit:hover{background:#3d3660;color:#c4b5fd;}
.btn-del{background:#2d1c1c;color:#f87171;}
.btn-del:hover{background:#7f1d1d;color:#fca5a5;}
.btn-toggle{background:#1e2a1e;color:#4ade80;}
.btn-toggle:hover{background:#14532d;color:#86efac;}
.btn-toggle.off{background:#2d1c1c;color:#f87171;}
.btn-toggle.off:hover{background:#7f1d1d;}

.empty-state{text-align:center;padding:32px 20px;color:#4a4868;font-size:13px;}

/* GERAR POST */
.gerar-wrap{display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start;}
@media(max-width:900px){.gerar-wrap{grid-template-columns:1fr;}}

.form-card{background:#18162a;border:1px solid #2d2b45;border-radius:12px;padding:24px;}
.form-card h3{font-size:15px;font-weight:600;color:#f0eeff;margin-bottom:20px;}
.fgrp{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:600;color:#a78bfa;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase;}
select,input[type="text"],input[type="number"],textarea{width:100%;background:#0f0e17;border:1px solid #2d2b45;border-radius:8px;padding:10px 12px;font-size:14px;color:#f0eeff;outline:none;transition:border-color .2s;font-family:inherit;}
select:focus,input:focus,textarea:focus{border-color:#9b66f4;}
textarea{resize:vertical;min-height:80px;}
.btn-gerar{width:100%;background:#9b66f4;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;transition:background .2s;margin-top:4px;}
.btn-gerar:hover{background:#8b5cf6;}
.btn-gerar:disabled{background:#3d3660;color:#6b69a3;cursor:not-allowed;}

.preview-card{background:#18162a;border:1px solid #2d2b45;border-radius:12px;padding:24px;}
.preview-card h3{font-size:15px;font-weight:600;color:#f0eeff;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.preview-hint{color:#4a4868;font-size:13px;text-align:center;padding:60px 20px;}
.canvas-wrap{position:relative;text-align:center;max-height:420px;overflow:hidden;border-radius:8px;display:flex;align-items:center;justify-content:center;background:#1a1832;}
#canvas-preview{max-width:100%;max-height:420px;width:auto;height:auto;border-radius:8px;display:none;object-fit:contain;}
.btn-download{width:100%;background:#1e3a5f;border:1px solid #2563eb;border-radius:8px;padding:11px;font-size:14px;font-weight:600;color:#7dd3fc;cursor:pointer;transition:all .2s;margin-top:12px;display:none;}
.btn-download:hover{background:#1d4ed8;color:#fff;}

.msg-preview-info{background:#1a1830;border:1px solid #2d2b45;border-radius:8px;padding:12px 14px;margin-top:12px;display:none;}
.msg-preview-info p{font-size:12px;color:#7c7a9e;margin-bottom:4px;}
.msg-preview-info .msg-selected{font-size:13px;color:#c4b5fd;line-height:1.5;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:#18162a;border:1px solid #2d2b45;border-radius:14px;padding:28px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.modal h3{font-size:16px;font-weight:600;color:#f0eeff;margin-bottom:20px;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.btn-cancel{flex:1;background:#1e1a36;border:1px solid #2d2b45;border-radius:8px;padding:11px;font-size:14px;color:#7c7a9e;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{background:#2d2b45;color:#f0eeff;}
.btn-save{flex:2;background:#9b66f4;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;transition:background .2s;}
.btn-save:hover{background:#8b5cf6;}
.btn-save:disabled{background:#3d3660;color:#6b69a3;cursor:not-allowed;}

.hint{font-size:11px;color:#4a4868;margin-top:6px;line-height:1.6;}

.toast{position:fixed;bottom:24px;right:24px;background:#22c55e;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:2000;transform:translateY(100px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.error{background:#ef4444;}
.toast.info{background:#3b82f6;}

.loading{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* MOBILE */
@media(max-width:700px){
  .header{padding:10px 14px;flex-wrap:wrap;gap:8px;}
  .header-nav{gap:6px;}
  .btn-back,.btn-sair{padding:5px 10px;font-size:12px;}
  .tabs{padding:0 12px;overflow-x:auto;}
  .tab{padding:12px 14px;font-size:13px;}
  .main{padding:16px 12px;}
  .msgs-grid{grid-template-columns:1fr;}
  .gerar-wrap{grid-template-columns:1fr;}
  .form-card,.preview-card{padding:16px 14px;}
  .canvas-wrap{max-height:300px;}
  #canvas-preview{max-height:300px;}
}
</style>
</head>
<body>

<!-- AUTH -->
<script type="module" src="./mensagens_aniversario.js"></script>
</body>
</html>
