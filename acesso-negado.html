<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LUMA RH · Acesso Negado</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='12' fill='%239b66f4'/%3E%3Cpolygon points='20,15 42,15 50,72 58,15 80,15 60,88 40,88' fill='%23ffd000'/%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0f0e17;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.card{background:#18162a;border:1px solid #2d2b45;border-radius:16px;padding:48px 40px;width:100%;max-width:440px;text-align:center;}
.icon{font-size:56px;margin-bottom:20px;}
h1{font-size:20px;font-weight:700;color:#f0eeff;margin-bottom:10px;}
p{font-size:14px;color:#7c7a9e;line-height:1.7;margin-bottom:28px;}
.btn{display:inline-block;padding:10px 24px;background:#9b66f4;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;border:none;margin:4px;}
.btn-outline{background:transparent;border:1px solid #3d3b5a;color:#a78bfa;}
.btn-outline:hover{border-color:#9b66f4;}
.user{font-size:12px;color:#4a4868;margin-top:20px;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔒</div>
  <h1>Acesso não autorizado</h1>
  <p>Sua conta não tem permissão para acessar esta página.<br>
  Se acha que isso é um erro, entre em contato com o administrador do sistema.</p>
  <button class="btn" onclick="goHome()">Ir para o início</button>
  <button class="btn btn-outline" onclick="doLogout()">Sair da conta</button>
  <div class="user" id="user-info"></div>
</div>
<script type="module" src="./acesso-negado.js"></script>
</body>
</html>
