<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LUMA RH · Configurações</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='12' fill='%239b66f4'/%3E%3Cpolygon points='20,15 42,15 50,72 58,15 80,15 60,88 40,88' fill='%23ffd000'/%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0f0e17;color:#f0eeff;min-height:100vh;}

/* HEADER */
.header{background:#18162a;border-bottom:1px solid #2d2b45;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-box{width:38px;height:38px;border-radius:8px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.logo-box svg{width:38px;height:38px;}
.logo-box .tenant-logo-img{width:38px;height:38px;object-fit:contain;display:none;}
.logo-text{font-size:17px;font-weight:700;color:#fff;}
.logo-sub{font-size:11px;color:#a78bfa;letter-spacing:.04em;text-transform:uppercase;}
.header-nav{display:flex;gap:10px;align-items:center;}
.btn-back{color:#a78bfa;background:none;border:1px solid #3d3660;border-radius:7px;padding:6px 14px;font-size:13px;cursor:pointer;text-decoration:none;transition:all .2s;}
.btn-back:hover{background:#3d3660;color:#f0eeff;}
.btn-sair{background:#2d1c3e;border:1px solid #5b21b6;border-radius:7px;padding:6px 14px;font-size:13px;color:#c4b5fd;cursor:pointer;transition:all .2s;}
.btn-sair:hover{background:#5b21b6;color:#fff;}

/* MAIN */
.main{max-width:1400px;margin:0 auto;padding:20px 24px 40px;}
.page-title{font-size:20px;font-weight:700;color:#f0eeff;margin-bottom:2px;}
.page-sub{font-size:12px;color:#7c7a9e;margin-bottom:14px;}
.cards-grid{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start;}
@media(max-width:900px){.cards-grid{grid-template-columns:1fr;}}

/* CARDS */
.card{background:#18162a;border:1px solid #2d2b45;border-radius:14px;padding:16px;}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.card-icon{font-size:18px;}
.card-title{font-size:15px;font-weight:700;color:#f0eeff;}
.card-desc{font-size:12px;color:#7c7a9e;margin-bottom:20px;}

/* FORM */
.fgrp{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
input[type="text"],input[type="email"],textarea,select{
  width:100%;border:1px solid #2d2b45;border-radius:8px;padding:9px 12px;font-size:14px;
  color:#f0eeff;background:#0f0e17;outline:none;transition:border .2s;font-family:inherit;
}
input:focus,textarea:focus,select:focus{border-color:#9b66f4;box-shadow:0 0 0 3px rgba(155,102,244,.12);}
select option{background:#18162a;}
.slug-hint{font-size:11px;color:#4a4868;margin-top:4px;}

/* LOGO UPLOAD */
.logo-upload{border:2px dashed #2d2b45;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.logo-upload:hover{border-color:#9b66f4;background:#1a1832;}
.logo-upload.drag{border-color:#9b66f4;background:#1e1a36;}
.logo-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.logo-preview{display:none;max-height:100px;max-width:200px;object-fit:contain;margin:0 auto 10px;border-radius:8px;}
.logo-upload-icon{font-size:28px;margin-bottom:8px;}
.logo-upload-text{font-size:13px;color:#7c7a9e;}
.logo-upload-hint{font-size:11px;color:#4a4868;margin-top:4px;}
.logo-clear{display:none;background:#2d1c1c;border:1px solid #7f1d1d;border-radius:6px;padding:4px 10px;font-size:11px;color:#fca5a5;cursor:pointer;margin-top:8px;}
.logo-clear:hover{background:#3d1515;}

/* CORES */
.color-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.color-field{position:relative;}
.color-swatch{width:36px;height:36px;border-radius:6px;border:2px solid #2d2b45;cursor:pointer;flex-shrink:0;overflow:hidden;position:relative;}
.color-swatch input[type="color"]{position:absolute;inset:-4px;width:calc(100%+8px);height:calc(100%+8px);opacity:0;cursor:pointer;border:none;}
.color-input-wrap{display:flex;align-items:center;gap:8px;}
.color-input-wrap input[type="text"]{font-family:monospace;}

.color-preview-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.preview-btn{height:36px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:default;transition:all .3s;display:flex;align-items:center;justify-content:center;}
.preview-btn.primary{background:var(--prev-primary,#9b66f4);color:#fff;}
.preview-btn.secondary{background:var(--prev-secondary,#ffd000);color:#0f0e17;}

/* MODELOS */
.modelos-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
@media(max-width:900px){.modelos-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:500px){.modelos-grid{grid-template-columns:1fr;}}
.modelo-slot{border:1px solid #2d2b45;border-radius:10px;overflow:hidden;}
.modelo-preview{width:100%;height:clamp(140px,22vh,200px);background:#1a1832;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.modelo-preview img{width:100%;height:100%;object-fit:contain;display:none;}
.modelo-preview .placeholder{text-align:center;color:#4a4868;}
.modelo-preview .placeholder .icon{font-size:32px;margin-bottom:6px;}
.modelo-preview .placeholder .txt{font-size:12px;}
.modelo-preview .overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;gap:8px;}
.modelo-preview:hover .overlay{display:flex;}
.modelo-info{padding:12px;background:#18162a;}
.modelo-num{font-size:11px;font-weight:700;color:#9b66f4;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
.modelo-select{width:100%;margin-bottom:6px;}
.modelo-upload-btn{width:100%;background:#1e1a36;border:1px solid #3d3660;border-radius:6px;padding:7px;font-size:12px;font-weight:600;color:#a78bfa;cursor:pointer;text-align:center;transition:all .2s;position:relative;overflow:hidden;margin-top:4px;}
.modelo-upload-btn:hover{background:#3d3660;color:#f0eeff;}
.modelo-upload-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.modelo-clear-btn{width:100%;background:#2d1c1c;border:1px solid #7f1d1d;border-radius:6px;padding:5px;font-size:11px;color:#fca5a5;cursor:pointer;text-align:center;margin-top:4px;display:none;}
.modelo-clear-btn:hover{background:#3d1515;}

/* SAVE */
.save-bar{display:flex;justify-content:flex-end;margin-top:8px;}
.btn-save{background:#9b66f4;border:none;border-radius:9px;padding:12px 28px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;transition:background .2s;display:flex;align-items:center;gap:8px;}
.btn-save:hover{background:#8b5cf6;}
.btn-save:disabled{background:#3d3660;color:#6b69a3;cursor:not-allowed;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:2000;transform:translateY(100px);opacity:0;transition:all .3s;max-width:360px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:#22c55e;color:#fff;}
.toast.error{background:#ef4444;color:#fff;}
.toast.info{background:#3b82f6;color:#fff;}

.loading-spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.reset-btn{background:none;border:none;font-size:11px;color:#4a4868;cursor:pointer;text-decoration:underline;margin-top:6px;display:block;}
.reset-btn:hover{color:#9b66f4;}

/* MOBILE */
@media(max-width:600px){
  .header{padding:10px 14px;}
  .logo-text{font-size:15px;}
  .header-nav{gap:6px;}
  .btn-back,.btn-sair{padding:5px 10px;font-size:12px;}
  .main{padding:14px 12px 32px;}
  .cards-grid{grid-template-columns:1fr;}
  .card{padding:14px 12px;}
  .color-row{grid-template-columns:1fr;}
  .modelos-grid{grid-template-columns:repeat(2,1fr)!important;}
  .save-bar{margin-top:6px;}
  .btn-save{width:100%;justify-content:center;}
}
</style>
</head>
<body>

<!-- AUTH GUARD -->
<script type="module" src="./configuracoes.js"></script>
</body>
</html>
